---
layout: default
---
<article>
  <header class="post-header">
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y年%m月%d日" }}</time>
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="post-description">{{ page.description }}</p>{% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>

<a href="{{ '/' | relative_url }}" class="back-link">← 返回文章列表</a>
